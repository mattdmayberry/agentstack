# Supabase database CI/CD
#
# GitHub → Settings → Secrets and variables → Actions:
#   SUPABASE_ACCESS_TOKEN  https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   Project → Settings → General → Reference ID
#
# Only runs when supabase/** (or this file) changes — NOT for public/, src/, etc.
# Pull requests (same repo only): dry-run so merges are safe.
# Push to main: applies pending migrations via supabase db push.
# Manual: Actions → Supabase → Run workflow.

name: Supabase

on:
  pull_request:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase.yml"
  workflow_dispatch:

jobs:
  verify:
    name: Migrations dry-run
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Dry-run (no schema changes)
        run: supabase db push --dry-run --yes

  deploy:
    name: Apply migrations
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    concurrency:
      group: supabase-db-deploy
      cancel-in-progress: false
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Push migrations to linked project
        run: supabase db push --yes
